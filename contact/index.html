<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact | JDS PR</title>
  <meta name="description" content="Contact JDS PR for public relations inquiries.">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>

<div id="site-header"></div>

<section class="page-hero">
  <div class="container">
    <h1>Contact</h1>
  </div>
</section>

<section class="section">
  <div class="container">
    <div class="contact-grid">
      <div class="contact-form">
        <form id="contact-form" action="https://formbold.com/s/YOUR_FORM_ID" method="POST">

          <label for="fname">First Name</label>
          <input type="text" id="fname" name="first_name" required>

          <label for="lname">Last Name</label>
          <input type="text" id="lname" name="last_name" required>

          <label for="email">Email</label>
          <input type="email" id="email" name="email" required>

          <label for="subject-field">Subject</label>
          <input type="text" id="subject-field" name="subject_field" required>

          <label for="message">Message</label>
          <textarea id="message" name="message" required></textarea>

          <button type="submit" class="btn">Send</button>
        </form>
      </div>

      <div class="contact-info">
        <h3>Get In Touch</h3>
        <p>
          <strong>Phone:</strong><br>
          <a href="tel:18185225251">(818) 522-5251</a>
        </p>
        <p>
          <strong>Address:</strong><br>
          4400 W Riverside Dr<br>
          Suite 110-269<br>
          Burbank, CA 91505
        </p>
        <p>
          <strong>Follow Us:</strong><br>
          <a href="https://www.facebook.com/jay.d.schwartz" target="_blank" rel="noopener">Facebook</a> &middot;
          <a href="https://twitter.com/jds_pr" target="_blank" rel="noopener">Twitter</a> &middot;
          <a href="https://www.instagram.com/jaydschwartz" target="_blank" rel="noopener">Instagram</a>
        </p>
        <div class="disclaimer">
          JDSPR does not handle autograph requests. Please contact Managers and Agents with autograph requests.
        </div>
      </div>
    </div>
  </div>
</section>

<div id="site-footer"></div>

<script src="../js/main.js"></script>
<script>initSite('Contact');</script>
</body>
</html>
